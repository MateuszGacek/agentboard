services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: https://scalesoftware.matgac.pl
      WEB_DIST_DIR: /app/apps/web/dist
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set with URL-encoded credentials}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      DEMO_SESSION_TTL_HOURS: ${DEMO_SESSION_TTL_HOURS:-24}
      DEMO_CLEANUP_DAYS: ${DEMO_CLEANUP_DAYS:-7}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-nano}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-20000}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-1200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    networks:
      - default
      - coolify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentboard}
      POSTGRES_USER: ${POSTGRES_USER:-agentboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
  coolify:
    external: true
